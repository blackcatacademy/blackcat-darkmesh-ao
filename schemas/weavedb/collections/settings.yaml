format: weavedb-collection/v1
name: settings
schema:
  type: object
  required: [id, site_id]
  properties:
    id:       { type: string }
    site_id:  { type: string }
    locale:   { type: string }
    currency: { type: string, minLength: 3, maxLength: 3 }
    timezone: { type: string }
    payment_providers: { type: array, items: { type: string } }
    shipping_origin:   { type: string }
indexes:
  - fields: [site_id]
