format: weavedb-collection/v1
name: sites
schema:
  type: object
  required: [id, host, created_at]
  properties:
    id:         { type: string }
    host:       { type: string, pattern: "^[a-z0-9.-]+$" }
    owner:      { type: string }
    status:     { type: string, enum: [active, inactive] }
    created_at: { type: string, format: date-time }
indexes:
  - fields: [host]
