format: weavedb-collection/v1
name: subscriptions
schema:
  type: object
  required: [id, user_id, plan_id, status, started_at]
  properties:
    id:         { type: string }
    user_id:    { type: string }
    plan_id:    { type: string }
    status:     { type: string, enum: [active, past_due, canceled, trialing] }
    started_at: { type: string, format: date-time }
    ends_at:    { type: string, format: date-time }
    meta:       { type: object }
indexes:
  - fields: [user_id, status]
