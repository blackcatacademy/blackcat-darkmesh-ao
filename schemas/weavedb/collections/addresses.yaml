format: weavedb-collection/v1
name: addresses
schema:
  type: object
  required: [id, user_id, line1, city, country]
  properties:
    id:       { type: string }
    user_id:  { type: string }
    line1:    { type: string }
    line2:    { type: string }
    city:     { type: string }
    region:   { type: string }
    postal:   { type: string }
    country:  { type: string, minLength: 2, maxLength: 2 }
    phone:    { type: string }
    label:    { type: string }
indexes:
  - fields: [user_id, country]
