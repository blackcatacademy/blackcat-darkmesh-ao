format: weavedb-collection/v1
name: segments
schema:
  type: object
  required: [id, site_id, name]
  properties:
    id:       { type: string }
    site_id:  { type: string }
    name:     { type: string }
    rules:    { type: object }
    last_refreshed_at: { type: string, format: date-time }
indexes:
  - fields: [site_id, name]
