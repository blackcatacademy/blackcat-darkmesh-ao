format: weavedb-collection/v1
name: fragments
schema:
  type: object
  required: [id, site_id, kind, content]
  properties:
    id:       { type: string }
    site_id:  { type: string }
    kind:     { type: string }   # hero, cta, banner, footer, etc.
    content:  { type: object }
    locale:   { type: string }
    updated_at: { type: string, format: date-time }
indexes:
  - fields: [site_id, kind]
