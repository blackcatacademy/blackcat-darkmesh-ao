format: weavedb-collection/v1
name: downloads
schema:
  type: object
  required: [id, user_id, product_id, file_id, ts]
  properties:
    id:         { type: string }
    user_id:    { type: string }
    product_id: { type: string }
    file_id:    { type: string }
    device_id:  { type: string }
    ip_hash:    { type: string }
    ts:         { type: string, format: date-time }
indexes:
  - fields: [user_id, product_id]
