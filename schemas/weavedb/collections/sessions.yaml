format: weavedb-collection/v1
name: sessions
schema:
  type: object
  required: [id, user_id, issued_at]
  properties:
    id:        { type: string }
    user_id:   { type: string }
    issued_at: { type: string, format: date-time }
    expires_at: { type: string, format: date-time }
    ip_hash:   { type: string }
indexes:
  - fields: [user_id]
