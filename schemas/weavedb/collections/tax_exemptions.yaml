format: weavedb-collection/v1
name: tax_exemptions
schema:
  type: object
  required: [id, site_id, entity_type, reference]
  properties:
    id:          { type: string }
    site_id:     { type: string }
    entity_type: { type: string, enum: [business, nonprofit, government] }
    reference:   { type: string }   # VAT ID, EIN, etc.
    country:     { type: string, minLength: 2, maxLength: 2 }
    valid_from:  { type: string, format: date-time }
    valid_to:    { type: string, format: date-time }
indexes:
  - fields: [site_id, reference]
