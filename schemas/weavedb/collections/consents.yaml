format: weavedb-collection/v1
name: consents
schema:
  type: object
  required: [id, user_id, type, version, granted_at]
  properties:
    id:         { type: string }
    user_id:    { type: string }
    type:       { type: string }   # privacy_policy, marketing, cookies
    version:    { type: string }
    granted_at: { type: string, format: date-time }
    revoked_at: { type: string, format: date-time }
    meta:       { type: object }
indexes:
  - fields: [user_id, type]
