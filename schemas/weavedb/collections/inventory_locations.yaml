format: weavedb-collection/v1
name: inventory_locations
schema:
  type: object
  required: [id, name]
  properties:
    id:      { type: string }
    name:    { type: string }
    country: { type: string, minLength: 2, maxLength: 2 }
    region:  { type: string }
    city:    { type: string }
indexes:
  - fields: [name]
