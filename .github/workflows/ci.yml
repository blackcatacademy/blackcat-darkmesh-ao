name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  verify:
    name: Static checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Lua 5.4
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.4

      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/latest/download/gitleaks-linux-amd64.tar.gz -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks

      - name: Preflight (schemas + Lua syntax + deps)
        env:
          RUN_DEPS_CHECK: 1
        run: scripts/verify/preflight.sh

      - name: Secret scan (gitleaks)
        run: gitleaks detect --no-git -v

      - name: Luacheck (if available)
        run: |
          if command -v luacheck >/dev/null 2>&1; then
            luacheck ao scripts
          else
            echo "luacheck not installed; skipping"
          fi

      - name: Export audit logs (mock)
        if: always()
        run: scripts/export/audit_ci.sh

      - name: Upload audit logs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-logs
          path: artifacts/audit.ndjson
          if-no-files-found: ignore

      - name: Arweave health (optional)
        if: env.ARWEAVE_HTTP_ENDPOINT != ''
        env:
          ARWEAVE_HTTP_ENDPOINT: ${{ env.ARWEAVE_HTTP_ENDPOINT }}
          ARWEAVE_HTTP_TIMEOUT: 5
        run: bash scripts/verify/arweave_health.sh

      - name: Signer check (optional)
        if: env.ARWEAVE_HTTP_REAL == '1'
        env:
          ARWEAVE_HTTP_SIGNER: ${{ env.ARWEAVE_HTTP_SIGNER }}
          ARWEAVE_HTTP_REAL: ${{ env.ARWEAVE_HTTP_REAL }}
        run: bash scripts/verify/signer_check.sh
