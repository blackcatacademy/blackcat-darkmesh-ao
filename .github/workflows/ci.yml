name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch: {}

jobs:
  verify:
    name: Static checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Lua 5.4
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.4 luarocks

      - name: Install required rocks (Lua 5.4: cjson/luv/lsqlite3/luaossl)
        run: |
          rocks=(
            "cjson 2.1.0-1"
            "luv 1.51.0-1"
            "lsqlite3 0.9.5-1"
            "luaossl 20230929-0"
          )
          for entry in "${rocks[@]}"; do
            set -- $entry
            luarocks --lua-version=5.4 install --local "$1" "$2" || exit 1
          done
          echo "$HOME/.luarocks/bin" >> $GITHUB_PATH

      - name: Install luacheck/stylua (Lua 5.4)
        run: |
          if command -v luarocks >/dev/null 2>&1; then
            luarocks --lua-version=5.4 install --local luacheck || true
            luarocks --lua-version=5.4 install --local stylua || true
            echo "$HOME/.luarocks/bin" >> $GITHUB_PATH
          else
            echo "luarocks not installed; failing luacheck/stylua install" && exit 1
          fi

      - name: Install gitleaks
        run: |
          curl -sSfL https://raw.githubusercontent.com/gitleaks/gitleaks/master/scripts/install.sh | bash -s -- -b /usr/local/bin

      - name: Preflight (schemas + Lua syntax + deps)
        env:
          RUN_DEPS_CHECK: 1
          AUTH_REQUIRE_SIGNATURE: 1  # fail-closed: require libsodium/openssl present
        run: scripts/verify/preflight.sh

      - name: Enforce libsodium/ed25519
        run: scripts/verify/libsodium_strict.sh

      - name: Checksum alert (audit/queue/wal)
        env:
          AUDIT_LOG_DIR: arweave/manifests
        run: scripts/verify/checksum_alert.sh

      - name: Secret scan (gitleaks)
        run: gitleaks detect --no-git -v

      - name: Arweave hash verify (optional)
        if: env.ARWEAVE_VERIFY_FILE != '' && env.ARWEAVE_VERIFY_TX != ''
        env:
          ARWEAVE_VERIFY_FILE: ${{ env.ARWEAVE_VERIFY_FILE }}
          ARWEAVE_VERIFY_TX: ${{ env.ARWEAVE_VERIFY_TX }}
        run: scripts/verify/verify_arweave_hash.sh "$ARWEAVE_VERIFY_FILE" "$ARWEAVE_VERIFY_TX"

      - name: Arweave hash verify (enforced on main)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/main')
        env:
          ARWEAVE_VERIFY_FILE: ${{ env.ARWEAVE_VERIFY_FILE }}
          ARWEAVE_VERIFY_TX: ${{ env.ARWEAVE_VERIFY_TX }}
        run: |
          if [ -z "${ARWEAVE_VERIFY_FILE:-}" ] || [ -z "${ARWEAVE_VERIFY_TX:-}" ]; then
            echo "ARWEAVE_VERIFY_* not set; failing release hash check" && exit 1
          fi
          scripts/verify/verify_arweave_hash.sh "$ARWEAVE_VERIFY_FILE" "$ARWEAVE_VERIFY_TX"

      - name: Luacheck (if available)
        run: |
          luacheck ao scripts

      - name: Stylua
        run: stylua --check ao scripts

      - name: Export audit logs (mock)
        if: always()
        run: scripts/export/audit_ci.sh

      - name: Upload audit logs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-logs
          path: artifacts/audit.ndjson
          if-no-files-found: ignore

      - name: Arweave health (optional)
        if: env.ARWEAVE_HTTP_ENDPOINT != ''
        env:
          ARWEAVE_HTTP_ENDPOINT: ${{ env.ARWEAVE_HTTP_ENDPOINT }}
          ARWEAVE_HTTP_TIMEOUT: 5
        run: bash scripts/verify/arweave_health.sh

      - name: Signer check (optional)
        if: env.ARWEAVE_HTTP_REAL == '1'
        env:
          ARWEAVE_HTTP_SIGNER: ${{ env.ARWEAVE_HTTP_SIGNER }}
          ARWEAVE_HTTP_REAL: ${{ env.ARWEAVE_HTTP_REAL }}
        run: bash scripts/verify/signer_check.sh
